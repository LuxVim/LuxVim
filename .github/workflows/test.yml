name: tests
on:
  pull_request:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        nvim-version: ['v0.10.0', 'stable', 'nightly']
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.nvim-version }}

      - name: Cache plenary
        uses: actions/cache@v4
        with:
          path: data/test-plenary
          key: plenary-${{ hashFiles('tests/minimal_init.lua') }}

      - name: Run tests
        run: ./scripts/test.sh

      - name: Validate sample config
        run: ./scripts/validate.sh
